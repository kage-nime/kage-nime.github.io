
<!DOCTYPE html>
<html>
<head>
  <title>Ransomware Demo</title>
  <style>
    body {
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
    }
    .lock-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>Welcome to Ransomware Demo</h1>
  <button onclick="lockScreen()">Lock Screen</button>
  
  <div class="lock-screen" id="lock-screen">
    <h1>Your screen has been locked!</h1>
    <p>To unlock, enter the password: <input type="password" id="password"></p>
    <button onclick="unlockScreen()">Unlock</button>
  </div>
  
  <script>
  
  document.addEventListener("DOMContentLoaded", function() {
  lockScreen();
});

function lockScreen() {
  document.getElementById("lock-screen").style.display = "block";
  document.body.style.overflow = "hidden";
}

function unlockScreen() {
  const password = document.getElementById("password").value;
  if (password === "rahasia") {
    document.getElementById("lock-screen").style.display = "none";
    document.body.style.overflow = "auto";
  } else {
    alert("Password salah!");
  }
}
  }
}</script>
</body>
</html>
